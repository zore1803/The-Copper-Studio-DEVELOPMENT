<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Payment | The Copper Studio</title>
    <link rel="stylesheet" href="assets/styles.css?v=pages-1">
  </head>
  <body data-page="payment">
    <header class="shell-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">TCS</span>
        <span>The Copper Studio</span>
      </a>
      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html">Pricing Packages</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading">
        <span class="eyebrow">Review &amp; Pay</span>
        <h1>Confirm your order.</h1>
        <p>Review your package and amount, then pay securely via the Razorpay window.</p>
      </section>

      <section class="two-column payment-layout">
        <aside class="panel">
          <p class="mini-label">Selected Package</p>
          <div id="packageDetails"></div>
          <div class="summary-divider"></div>
          <div class="customer-card">
            <p class="mini-label">Customer</p>
            <strong id="summaryCustomer">-</strong>
            <span id="summaryContact">-</span>
          </div>
        </aside>

        <section class="panel payment-summary" aria-label="Payment summary">
          <div class="payment-summary-head">
            <p class="mini-label">Amount Summary</p>
            <span class="secure-badge"><span class="material-symbols-outlined">lock</span> 100% Secure</span>
          </div>

          <div id="amountBreakdown"></div>

          <div class="payment-actions">
            <a class="btn btn-secondary" href="checkout.html">Back</a>
            <button class="btn btn-primary" type="button" id="payButton">Pay Securely <span class="material-symbols-outlined">arrow_forward</span></button>
          </div>

          <p class="gateway-note" id="gatewayNote">Click Pay Securely to open the Razorpay payment window.</p>
        </section>
      </section>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="assets/app.js?v=pages-1"></script>
  </body>
</html>
